{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10 md:mt-20 bg-white dark:bg-cardbg p-8 rounded-2xl shadow-xl border border-slate-200 dark:border-white/5 transition-colors duration-300">
    <h1 class="text-2xl font-black mb-6 text-slate-900 dark:text-white text-center">Accès Restreint</h1>
    
    {% if error %}
    <div class="bg-red-100 dark:bg-netflix/20 text-red-600 dark:text-netflix p-4 rounded-lg text-sm font-bold mb-4 border border-red-300 dark:border-netflix/50 text-center transition-colors">{{ error }}</div>
    {% endif %}

    <form method="POST" class="flex flex-col gap-5">
        <div>
            <label class="block text-xs font-bold text-slate-500 dark:text-gray-400 mb-2 tracking-wide">MOT DE PASSE ADMIN</label>
            <input type="password" name="password" required class="w-full bg-slate-100 dark:bg-darkbg border border-slate-300 dark:border-white/10 rounded px-4 py-3 text-sm focus:outline-none focus:border-slate-500 dark:focus:border-gray-400 transition-colors text-slate-900 dark:text-gray-200">
        </div>
        <button type="submit" class="w-full bg-netflix text-white font-bold py-3 rounded mt-2 hover:bg-red-700 transition-colors shadow-lg">Se connecter</button>
    </form>
</div>
{% endblock %}
