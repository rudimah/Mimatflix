{% extends "base.html" %}

{% block title %}{{ movie.title }}{% endblock %}

{% block styles %}
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<style>
    :root { --plyr-color-main: #e50914; }
    .plyr--fullscreen-active .plyr__video-wrapper { height: 100vh; height: 100dvh; }
    .plyr--fullscreen-active { z-index: 99999 !important; }
</style>
{% endblock %}

{% block content %}
<div class="mb-8">
    <h2 class="text-3xl md:text-4xl font-extrabold flex items-center justify-center lg:justify-start gap-4 flex-wrap">
        {{ movie.title }}
        <a href="{{movie.url}}" target="_blank" class="transition-transform hover:scale-110">
            <img src="{{ url_for('static', filename='imdb.svg') }}" alt="Imdb" class="h-8 md:h-10 w-auto">
        </a>
    </h2>
</div>

<div class="grid grid-cols-1 lg:grid-cols-[300px_1fr] gap-8 items-start">
    
    <div class="flex flex-col items-center max-w-[250px] lg:max-w-none mx-auto lg:mx-0 w-full">
        {% if movie.poster %}
        <div class="w-full rounded-xl overflow-hidden shadow-2xl mb-4 border border-white/5">
            <img src="{{ movie.poster }}" alt="Affiche de {{ movie.title }}" class="w-full h-auto block">
        </div>
        {% endif %}
        <button onclick="window.history.back()" class="w-full py-3 bg-white/10 hover:bg-white/20 rounded-lg text-center font-semibold transition-colors cursor-pointer">
            ⬅ Retour
        </button>
    </div>

    <div class="relative rounded-xl overflow-hidden shadow-[0_15px_40px_rgba(0,0,0,0.5)] bg-black min-h-[300px] md:min-h-[500px] flex items-center justify-center group" id="videoContainer">
        
       <div id="videoLoader" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/90 backdrop-blur-md transition-opacity duration-300 pointer-events-none">
            <div class="w-16 h-16 border-4 border-zinc-700 border-t-primary rounded-full animate-spin"></div>
            <p class="mt-4 text-zinc-300 font-medium animate-pulse tracking-wide">Chargement du film...</p>
        </div>

        <div id="seekFeedback" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-3xl text-white/90 bg-black/60 px-6 py-4 rounded-full pointer-events-none opacity-0 transition-all z-20 font-bold scale-90"></div>
        <div id="resumeToast" class="absolute top-5 right-5 bg-green-600/95 text-white px-6 py-3 rounded-lg font-semibold z-30 translate-x-[150%] transition-transform duration-500 shadow-xl">Lecture reprise</div>

        <video id="player" playsinline controls crossorigin preload="metadata" class="w-full">
            <source src="{{ movie.play_url if movie.play_url else '' }}" type="video/mp4" />
        </video>
    </div>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const videoElement = document.getElementById('player');
        if (!videoElement) return;

        const STORAGE_KEY = "video_progress_{{ movie.title | replace(' ', '_') | lower }}";
        const feedbackEl = document.getElementById('seekFeedback');
        const resumeToast = document.getElementById('resumeToast');
        const loader = document.getElementById('videoLoader');

        // Initialisation de Plyr
        const player = new Plyr('#player', {
            controls: ['play-large', 'restart', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            seekTime: 10, 
            keyboard: { focused: true, global: true },
            fullscreen: { enabled: true, fallback: true, iosNative: true } 
        });

        // Gestion du loader : on l'enlève seulement si la vidéo commence vraiment à jouer
        player.on('ready', () => {
        if(loader) loader.classList.add('opacity-0', 'pointer-events-none');
        });

        // Gestion du loader : on l'enlève seulement si la vidéo commence vraiment à jouer
        player.on('playing', () => {
            if(loader) loader.classList.add('opacity-0', 'pointer-events-none');
        });
        player.on('canplay', () => {
            if(loader) loader.classList.add('opacity-0', 'pointer-events-none');
        });
        player.on('waiting', () => {
            if(loader) loader.classList.remove('opacity-0', 'pointer-events-none');
        });
        if (videoElement.readyState >= 3) {
            if(loader) loader.classList.add('opacity-0', 'pointer-events-none');
        }

        // Formatage du temps pour le toast de reprise
        function formatTime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Reprise de la lecture
        player.on('loadedmetadata', () => {
            const savedTime = localStorage.getItem(STORAGE_KEY);
            if (savedTime && parseFloat(savedTime) > 5) {
                const time = parseFloat(savedTime);
                player.currentTime = time;
                if(resumeToast) {
                    resumeToast.innerText = "Reprise à " + formatTime(time) + " ↺";
                    resumeToast.classList.remove('translate-x-[150%]');
                    setTimeout(() => resumeToast.classList.add('translate-x-[150%]'), 4000);
                }
            }
        });

        // Sauvegarde de la progression
        player.on('timeupdate', () => {
            if (player.playing && player.currentTime > 0) {
                localStorage.setItem(STORAGE_KEY, player.currentTime);
            }
        });

        // Double-clic pour avancer/reculer de 10s
        const wrapper = document.querySelector('.plyr'); 
        if(wrapper) {
            let lastClickTime = 0;
            wrapper.addEventListener('click', (e) => {
                const currentTime = new Date().getTime();
                const timeDiff = currentTime - lastClickTime;
                if (timeDiff < 300 && timeDiff > 0) {
                    e.preventDefault(); e.stopImmediatePropagation(); 
                    const rect = wrapper.getBoundingClientRect();
                    const x = e.clientX - rect.left; 
                    const width = rect.width;
                    if (x < width * 0.35) { player.rewind(10); showFeedback('⏪ -10s'); } 
                    else if (x > width * 0.65) { player.forward(10); showFeedback('+10s ⏩'); }
                    lastClickTime = 0; 
                } else lastClickTime = currentTime;
            }, true);
        }

        function showFeedback(text) {
            if(!feedbackEl) return;
            feedbackEl.classList.remove('opacity-100', 'scale-100');
            feedbackEl.classList.add('opacity-0', 'scale-90');
            void feedbackEl.offsetWidth; 
            feedbackEl.innerText = text;
            feedbackEl.classList.remove('opacity-0', 'scale-90');
            feedbackEl.classList.add('opacity-100', 'scale-100');
            setTimeout(() => {
                feedbackEl.classList.remove('opacity-100', 'scale-100');
                feedbackEl.classList.add('opacity-0', 'scale-90');
            }, 600);
        }
    });
</script>
{% endblock %}
