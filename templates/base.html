<!DOCTYPE html>
<html lang="fr" class="antialiased dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mimatflix{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.jpg') }}" type="image/jpg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    {% block styles %}{% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="min-h-screen flex flex-col pt-24 bg-slate-50 dark:bg-bgBase text-slate-900 dark:text-zinc-100 transition-colors duration-300 selection:bg-primary selection:text-white">
    
    <header class="fixed top-0 w-full glass-panel z-50 flex items-center justify-between px-6 py-4 transition-colors duration-300">
        <h1 class="text-primary font-black text-2xl uppercase tracking-widest flex items-center gap-2">
            <a href="{{ url_for('index') }}" class="hover:scale-105 transition-transform duration-300 flex items-center gap-2">
                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                Mimatflix
            </a>
        </h1>
        <nav class="flex items-center gap-6">
            <a href="{{ url_for('index') }}" class="text-sm sm:text-base text-zinc-700 dark:text-zinc-300 hover:text-primary dark:hover:text-white font-bold transition-colors">Accueil</a>
            <a href="{{ url_for('catalogue') }}" class="text-sm sm:text-base text-zinc-700 dark:text-zinc-300 hover:text-primary dark:hover:text-white font-bold transition-colors">Catalogue</a>
            
            <button id="theme-toggle" class="p-2.5 rounded-full bg-zinc-200 dark:bg-zinc-800 text-zinc-700 dark:text-yellow-400 hover:bg-zinc-300 dark:hover:bg-zinc-700 transition-colors focus:outline-none shadow-sm dark:shadow-none">
                <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
            </button>
        </nav>
    </header>

    <main class="flex-grow w-full max-w-screen-2xl mx-auto px-4 sm:px-6 md:px-10 lg:px-16 py-8 relative">
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-4xl h-96 bg-primary/10 dark:bg-primary/20 blur-[120px] rounded-full pointer-events-none -z-10 transition-colors duration-500"></div>
        {% block content %}{% endblock %}
    </main>
    
    <footer class="mt-auto py-8 border-t border-zinc-200 dark:border-white/5 text-center text-zinc-500 dark:text-zinc-600 text-sm transition-colors duration-300">
        <p class="font-medium tracking-wide">Mimatflix &copy; {{ current_year | default(2026) }}</p>
    </footer>

    <script defer src="/_vercel/insights/script.js"></script>
    <script>
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
            document.documentElement.classList.add('dark');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
            document.documentElement.classList.remove('dark');
        }

        var themeToggleBtn = document.getElementById('theme-toggle');

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (localStorage.getItem('theme')) {
                if (localStorage.getItem('theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
            }
        });
    </script>
</body>
</html>
