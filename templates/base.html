<!DOCTYPE html>
<html lang="fr" class="bg-zinc-950 text-white font-sans antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mimatflix{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.jpg') }}" type="image/jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#e50914',
                        primaryHover: '#f40612',
                        bgCard: '#1f1f1f',
                    }
                }
            }
        }
    </script>
    {% block styles %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col pt-20">
    <header class="fixed top-0 w-full bg-zinc-950/90 backdrop-blur-md border-b border-white/10 px-6 py-4 z-50 flex items-center justify-between">
        <h1 class="text-primary font-extrabold text-2xl uppercase tracking-wider">
            <a href="{{ url_for('index') }}" class="hover:text-primaryHover transition-colors">🎬 Mimatflix</a>
        </h1>
        <nav class="flex gap-4 sm:gap-6">
            <a href="{{ url_for('index') }}" class="text-sm sm:text-base text-zinc-300 hover:text-white font-semibold transition-colors">Accueil</a>
            <a href="{{ url_for('catalogue') }}" class="text-sm sm:text-base text-zinc-300 hover:text-white font-semibold transition-colors">Catalogue</a>
        </nav>
    </header>
    <main class="flex-grow w-full mx-auto px-4 sm:px-6 md:px-12 lg:px-20 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="mt-auto py-6 border-t border-white/5 text-center text-zinc-600 text-sm">
        <p>Mimatflix</p>
    </footer>
</body>
</html>
