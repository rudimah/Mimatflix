<!-- templates/edit.html -->
{% extends "base.html" %}
{% block title %}Modifier {{ movie.title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto mt-8 sm:mt-12 animate-fade-in">
    
    <div class="text-center mb-10">
        <h1 class="text-4xl md:text-5xl font-extrabold text-zinc-900 dark:text-white tracking-tight mb-3">Modifier le film</h1>
        <p class="text-zinc-500 dark:text-zinc-400 font-medium text-lg">{{ movie.title }}</p>
    </div>

    {% if error %}
    <div class="bg-rose-500/10 text-rose-600 dark:text-rose-400 p-5 rounded-2xl mb-8 border-l-4 border-rose-500 font-medium shadow-sm flex items-center gap-4">
        <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="glass-panel p-8 sm:p-10 rounded-3xl shadow-2xl flex flex-col gap-8 transition-colors border border-zinc-200 dark:border-white/5 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full blur-[60px] -z-10"></div>
        
        <div class="space-y-6">
            <div>
                <label class="flex items-center gap-2 text-zinc-600 dark:text-zinc-300 text-sm mb-3 font-bold uppercase tracking-widest">
                    <svg class="w-4 h-4 text-primary" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
                    Statut du film
                </label>
                <div class="relative">
                    <select name="status" class="w-full p-4 pl-5 bg-zinc-100 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 rounded-xl text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner appearance-none cursor-pointer font-medium">
                        <option value="available" {% if movie.status == 'available' %}selected{% endif %}>🟢 Disponible</option>
                        <option value="pending" {% if movie.status == 'pending' %}selected{% endif %}>🔵 En attente</option>
                        <option value="deleted" {% if movie.status == 'deleted' %}selected{% endif %}>🔴 Supprimé</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-zinc-400">
                        <svg class="fill-current h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <div class="h-px w-full bg-zinc-200 dark:bg-white/5"></div>

            <div>
                <label class="block text-zinc-600 dark:text-zinc-300 text-sm mb-3 font-bold uppercase tracking-widest">Lien IMDb</label>
                <input type="text" name="imdb_url" value="{{ movie.url }}" required class="w-full p-4 bg-zinc-100 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 rounded-xl text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner placeholder:text-zinc-500 font-medium">
            </div>
            
            <div>
                <label class="block text-zinc-600 dark:text-zinc-300 text-sm mb-3 font-bold uppercase tracking-widest flex items-center gap-2">
                    Lien Vidéo / R2 <span class="normal-case font-normal text-xs text-zinc-400 bg-zinc-200 dark:bg-zinc-800 px-2 py-1 rounded-md">Optionnel</span>
                </label>
                <input type="text" name="film_url" value="{{ movie.movie_url if movie.movie_url else '' }}" class="w-full p-4 bg-zinc-100 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 rounded-xl text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner placeholder:text-zinc-500 font-medium">
            </div>
            
            <div>
                <label class="block text-blue-500 dark:text-blue-400 text-sm mb-3 font-bold uppercase tracking-widest">Lien Source (Script)</label>
                <input type="text" name="source_link" value="{{ movie.source_link if movie.source_link else '' }}" class="w-full p-4 bg-zinc-100 dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 rounded-xl text-zinc-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-inner placeholder:text-zinc-500 font-medium">
            </div>
        </div>
        
        <button type="submit" class="w-full py-5 bg-primary hover:bg-primaryHover text-white rounded-xl font-extrabold uppercase tracking-widest transition-all shadow-xl hover:shadow-primary/40 active:scale-95 flex justify-center items-center gap-2 mt-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Enregistrer les modifications
        </button>
    </form>
    
    <a href="{{ url_for('add_movie') }}" class="flex items-center justify-center gap-2 mt-10 text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-white transition-colors font-bold group w-fit mx-auto">
        <svg class="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Annuler et retourner
    </a>
</div>
{% endblock %}
