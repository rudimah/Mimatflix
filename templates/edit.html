{% extends "base.html" %}

{% block title %}Modifier {{ movie.title }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-8 sm:mt-12">
    <h1 class="text-3xl font-extrabold text-primary text-center mb-8">Modifier le film</h1>

    {% if error %}
    <div class="bg-red-900/20 text-red-400 p-4 rounded-lg mb-6 border-l-4 border-primary font-medium">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="bg-bgCard p-6 sm:p-8 rounded-xl shadow-lg border border-white/5 flex flex-col gap-6">
        <div>
            <label class="block text-zinc-400 text-sm mb-2 font-semibold uppercase tracking-wider">Lien IMDb</label>
            <input type="text" name="imdb_url" value="{{ movie.url }}" required class="w-full p-4 bg-zinc-800 border border-transparent rounded-lg text-white focus:outline-none focus:bg-zinc-700 focus:border-b-2 focus:border-b-primary transition-colors">
        </div>
        
        <div>
            <label class="block text-zinc-400 text-sm mb-2 font-semibold uppercase tracking-wider">Lien Vidéo (.mp4)</label>
            <input type="text" name="film_url" value="{{ movie.movie_url }}" required class="w-full p-4 bg-zinc-800 border border-transparent rounded-lg text-white focus:outline-none focus:bg-zinc-700 focus:border-b-2 focus:border-b-primary transition-colors">
        </div>
        
        <button type="submit" class="w-full py-4 bg-primary hover:bg-primaryHover text-white rounded-lg font-bold uppercase tracking-wider transition-colors mt-4 shadow-lg shadow-primary/20">Enregistrer les modifications</button>
    </form>

    <a href="{{ url_for('add_movie') }}" class="block text-center mt-8 text-zinc-400 hover:text-white transition-colors border-b border-dotted border-zinc-500 w-fit mx-auto">⬅ Annuler</a>
</div>
{% endblock %}
