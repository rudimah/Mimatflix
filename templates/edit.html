{% extends "base.html" %}

{% block title %}Modifier {{ movie.title }}{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mt-8 sm:mt-12">
    <h1 class="text-3xl md:text-4xl font-extrabold text-primary text-center mb-8 tracking-tight">Modifier le film</h1>

    {% if error %}
    <div class="bg-red-100 dark:bg-red-900/20 text-red-600 dark:text-red-400 p-4 rounded-xl mb-6 border-l-4 border-primary font-medium shadow-sm">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="bg-white dark:bg-bgCard p-8 rounded-2xl shadow-xl dark:shadow-lg border border-slate-200 dark:border-white/5 flex flex-col gap-6 transition-colors">
        <div>
            <label class="block text-slate-500 dark:text-zinc-400 text-xs mb-2 font-bold uppercase tracking-widest">Lien IMDb</label>
            <input type="text" name="imdb_url" value="{{ movie.url }}" required class="w-full p-4 bg-slate-50 dark:bg-zinc-800 border border-slate-300 dark:border-transparent rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner">
        </div>
        
        <div>
            <label class="block text-slate-500 dark:text-zinc-400 text-xs mb-2 font-bold uppercase tracking-widest">Lien Vidéo (.mp4) - <span class="normal-case font-normal">Laissez vide si non téléchargé</span></label>
            <input type="text" name="film_url" value="{{ movie.movie_url if movie.movie_url else '' }}" class="w-full p-4 bg-slate-50 dark:bg-zinc-800 border border-slate-300 dark:border-transparent rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-inner">
        </div>

        <div>
            <label class="block text-blue-500 dark:text-blue-400 text-xs mb-2 font-bold uppercase tracking-widest">Lien Source (Script)</label>
            <input type="text" name="source_link" value="{{ movie.source_link if movie.source_link else '' }}" class="w-full p-4 bg-slate-50 dark:bg-zinc-800 border border-slate-300 dark:border-transparent rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-inner">
        </div>
        
        <button type="submit" class="w-full py-4 bg-primary hover:bg-primaryHover text-white rounded-xl font-bold uppercase tracking-widest transition-all mt-4 shadow-lg hover:shadow-primary/40 active:scale-95">Enregistrer les modifications</button>
    </form>

    <a href="{{ url_for('add_movie') }}" class="block text-center mt-8 text-slate-500 dark:text-zinc-400 hover:text-slate-800 dark:hover:text-white transition-colors font-medium hover:underline underline-offset-4 decoration-dotted w-fit mx-auto">⬅ Annuler</a>
</div>
{% endblock %}
